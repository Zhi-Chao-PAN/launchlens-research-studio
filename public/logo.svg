<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ll-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ll-shine" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.4"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#ll-grad)"/>
  <rect width="32" height="32" rx="8" fill="url(#ll-shine)"/>
  <!-- Magnifier ring -->
  <circle cx="14" cy="14" r="6.5" stroke="white" stroke-width="2.2" fill="none"/>
  <!-- Lens highlight -->
  <circle cx="11.5" cy="11.5" r="1.5" fill="white" opacity="0.6"/>
  <!-- Magnifier handle -->
  <line x1="18.5" y1="18.5" x2="25" y2="25" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
