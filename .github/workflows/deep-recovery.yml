name: Deep Research Recovery

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-research-recovery
  cancel-in-progress: false

jobs:
  recover:
    name: Wake due Deep work
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger authenticated recovery
        env:
          CRON_SECRET: ${{ secrets.LAUNCHLENS_CRON_SECRET }}
          RECOVERY_URL: https://launchlens-research-studio.vercel.app/api/cron/scheduler
        shell: bash
        run: |
          set -euo pipefail
          if [[ ${#CRON_SECRET} -lt 24 ]]; then
            echo "LAUNCHLENS_CRON_SECRET is missing or too short" >&2
            exit 1
          fi

          response_file="$(mktemp)"
          status="$(curl \
            --silent \
            --show-error \
            --retry 2 \
            --retry-all-errors \
            --max-time 55 \
            --request POST \
            --header "x-cron-secret: ${CRON_SECRET}" \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            "${RECOVERY_URL}")"

          if [[ "${status}" != "200" ]]; then
            echo "Recovery endpoint returned HTTP ${status}" >&2
            sed -E 's/[A-Za-z0-9_~+\/.=-]{24,}/<redacted>/g' "${response_file}" >&2
            exit 1
          fi

          node - "${response_file}" <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (payload.ok !== true) throw new Error("Recovery response was not successful");
          console.log(JSON.stringify({
            ok: payload.ok,
            triggered: payload.triggered,
            pruned: payload.pruned,
            deepRecovery: payload.deepRecovery,
            timestamp: payload.timestamp,
          }));
          NODE
