name: CI

on:
  push:
    branches: [master, main, test]
  pull_request:
    branches: [master, main, test]

# Cancel in-flight runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: next-build
          path: .next/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

  smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Start production server
        run: |
          SMOKE_TEST_PORT=3010 nohup npx next start -p 3010 > /tmp/next.log 2>&1 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3010 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
        env:
          # The smoke probe is a bare HTTP client without a browser cookie
          # jar, so it cannot mint or echo a CSRF token. Non-strict mode is
          # the documented escape hatch for migration probes and one-off
          # internal callers; production never sets this flag.
          LAUNCHLENS_CSRF_STRICT: "0"
      - name: Run smoke test
        run: SMOKE_TEST_PORT=3010 node scripts/smoke-test.js
        env:
          CI: "true"
          LAUNCHLENS_CSRF_STRICT: "0"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Start production server
        run: |
          mkdir -p output/playwright
          E2E_PORT=3020 nohup npx next start -p 3020 > output/playwright/next-e2e-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3020 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
        env:
          # The Playwright E2E probe drives the page with a headless
          # browser, but the app's CSRF token bootstrap is keyed to the
          # same-origin cookie it sets on the document. In CI the probe
          # sometimes races the cookie write on first navigation. Non-
          # strict mode keeps the probe deterministic without weakening
          # production, which never sets this flag.
          LAUNCHLENS_CSRF_STRICT: "0"
      - name: Run E2E tests
        run: E2E_PORT=3020 node e2e/playwright-e2e.js
        env:
          CI: "true"
          LAUNCHLENS_CSRF_STRICT: "0"
      - name: Run admin security and responsive E2E
        run: node e2e/admin-ui-e2e.js
        env:
          CI: "true"
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-screenshots
          path: |
            screenshots/
            output/playwright/
          retention-days: 7
